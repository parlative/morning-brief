    // Divider
    ctx.strokeStyle = isWar ? 'rgba(255,63,95,0.4)' : 'rgba(10,132,255,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(60, 140); ctx.lineTo(1020, 140); ctx.stroke();

    // News items
    const textItems = items.map(el => ({
      text: el.querySelector('.news-text')?.textContent?.trim() || '',
      src: el.querySelector('.news-source')?.textContent?.trim() || ''
    })).filter(i => i.text).slice(0, 5);

    let y = 190;
    textItems.forEach((item, i) => {
      // Number circle
      ctx.fillStyle = isWar ? '#ff375f' : '#0a84ff';
      ctx.beginPath(); ctx.arc(90, y + 4, 22, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 24px -apple-system, Arial'; ctx.textAlign = 'center';
      ctx.fillText(i + 1, 90, y + 13);
      ctx.textAlign = 'left';

      // Headline text (wrap)
      ctx.fillStyle = '#ffffff'; ctx.font = 'bold 32px -apple-system, Arial';
      const words = item.text.split(' ');
      let line = '', lineY = y;
      const maxW = 870, lineH = 42;
      for (const word of words) {

        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line.trim(), 130, lineY);
          line = word + ' '; lineY += lineH;

      ctx.fillText(line.trim(), 130, lineY);

      // Source

      ctx.fillText(item.src.split('·')[0].trim(), 130, lineY + 32);

      y = lineY + 80;

    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '22px -apple-system, Arial'; ctx.textAlign = 'center';

              <div style="width:56px;height:56px;border-radius:14px;background:#007aff;display:flex;align-items:center;justify-content:center;font-size:28px;">📤</div>
              <span style="font-size:11px;color:#333;font-weight:600;">Teilen</span>
            </button>

        </div>`;

// WEATHER SHARE — Canvas-based card
// ═══════════════════════════════════════════════════════
async function generateWeatherCard() {
  const w = window._weatherDisplay;
  if (!w) return null;

  const canvas = document.createElement('canvas');
  canvas.width = 1080; canvas.height = 1080;
  const ctx = canvas.getContext('2d');

  // Sky gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, 1080);
  const isWarm = w.temp > 20;
  if (w.code <= 2) {
    grad.addColorStop(0, '#1a6fc4'); grad.addColorStop(1, '#4da6f5');
  } else if (w.code <= 49) {
    grad.addColorStop(0, '#4a5568'); grad.addColorStop(1, '#718096');
  } else if (w.code <= 67) {
    grad.addColorStop(0, '#2d3748'); grad.addColorStop(1, '#4a5568');
  } else {
    grad.addColorStop(0, '#1a202c'); grad.addColorStop(1, '#2d3748');
  }
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1080);

  // Subtle circle deco
  ctx.globalAlpha = 0.08;
  ctx.beginPath(); ctx.arc(950, 150, 280, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill(); ctx.globalAlpha = 1;

  ctx.textAlign = 'center'; ctx.fillStyle = '#fff';

  // Label
  ctx.font = 'bold 30px -apple-system, Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('🌤  WETTER · 📍 ' + (w.city || 'Dein Standort'), 540, 110);

  // Big weather emoji
  ctx.font = '160px serif';
  ctx.fillText(wIcon(w.code), 540, 310);

  // Temperature
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 160px -apple-system, Arial';
  ctx.fillText(w.temp + '°', 540, 510);

  // Description
  ctx.font = 'bold 52px -apple-system, Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillText(wDesc(w.code), 540, 590);

  // Feels like
  ctx.font = '38px -apple-system, Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('🌡️ Gefühlt ' + w.feels + '°', 540, 650);

  // Stats row
  const stats = [
    { label: '🥶 Min', val: w.minT + '°' },
    { label: '🔥 Max', val: w.maxT + '°' },
    { label: '💧 Feuchte', val: w.humid + '%' },
    { label: '💨 Wind', val: w.wind + ' km/h' },
  ];
  const boxW = 220, boxH = 100, gap = 20;
  const totalW = stats.length * boxW + (stats.length - 1) * gap;
  const startX = (1080 - totalW) / 2;
  stats.forEach((s, i) => {
    const bx = startX + i * (boxW + gap);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.roundRect(bx, 720, boxW, boxH, 16); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '24px -apple-system, Arial';
    ctx.fillText(s.label, bx + boxW/2, 756);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 36px -apple-system, Arial';
    ctx.fillText(s.val, bx + boxW/2, 798);
  });

  // UV
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '32px -apple-system, Arial';
  ctx.fillText('☀️ UV-Index: ' + w.uv + ' — ' + w.uvInfo.l, 540, 870);

  // Rain
  const rainText = w.precSum > 0 ? `☔ ${w.precSum.toFixed(1)} mm · ${w.precPro}% Wahrscheinlichkeit` : '🌵 Kein Regen erwartet';
  ctx.font = '30px -apple-system, Arial';
  ctx.fillText(rainText, 540, 915);

  // Watermark
  const now = new Date();
  const months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '24px -apple-system, Arial';
  ctx.fillText(`Maya's Morning Brief · ${now.getDate()}. ${months[now.getMonth()]} ${now.getFullYear()}`, 540, 1048);

  return new Promise(res => canvas.toBlob(res, 'image/png', 0.95));
}

// SHARE FIX — Word of Day uses canvas-based card
// ═══════════════════════════════════════════════════════
async function generateWordCard() {
  const w = words[getDailyIndex(words.length)];
  const canvas = document.createElement('canvas');
  canvas.width = 1080; canvas.height = 1080;
  const ctx = canvas.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
  grad.addColorStop(0, '#eef2ff'); grad.addColorStop(1, '#e0e7ff');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1080);

  // Decorative circle
  ctx.globalAlpha = 0.10;
  ctx.beginPath(); ctx.arc(880, 200, 280, 0, Math.PI*2);
  ctx.fillStyle = '#818cf8'; ctx.fill(); ctx.globalAlpha = 1;

  // Label
  ctx.fillStyle = '#818cf8'; ctx.font = 'bold 28px -apple-system, Arial'; ctx.textAlign = 'center';
  ctx.fillText('📖  WORD OF THE DAY', 540, 140);

  // Divider
  ctx.strokeStyle = '#c7d2fe'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(200, 165); ctx.lineTo(880, 165); ctx.stroke();

  // Word
  ctx.fillStyle = '#3730a3'; ctx.font = 'bold 110px -apple-system, Arial';
  ctx.fillText(w.w, 540, 310);

  // Phonetic
  ctx.fillStyle = '#818cf8'; ctx.font = '38px -apple-system, Arial';
  ctx.fillText(w.ph, 540, 375);

  // Part of speech pill (drawn as rounded rect)
  const posText = w.pos.toUpperCase();
  ctx.font = 'bold 26px -apple-system, Arial';
  const pw = ctx.measureText(posText).width + 40;
  ctx.fillStyle = '#e0e7ff';
  ctx.beginPath(); ctx.roundRect(540 - pw/2, 400, pw, 44, 10);
  ctx.fill();
  ctx.fillStyle = '#4338ca'; ctx.fillText(posText, 540, 430);

  // Definition
  ctx.fillStyle = '#3730a3'; ctx.font = '44px -apple-system, Arial';
  wrapText(ctx, w.def, 540, 530, 860, 58);

  // Example
  ctx.fillStyle = '#6366f1'; ctx.font = 'italic 36px -apple-system, Arial';
  wrapText(ctx, w.ex, 540, 740, 860, 50);

  // German translation
  ctx.fillStyle = '#818cf8'; ctx.font = '32px -apple-system, Arial';
  wrapText(ctx, '🇩🇪 ' + w.de, 540, 880, 860, 45);

  // Watermark
  const now = new Date();
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  ctx.fillStyle = 'rgba(55,48,163,0.3)'; ctx.font = '24px -apple-system, Arial';
  ctx.fillText(`Maya's Morning Brief · ${now.getDate()}. ${months[now.getMonth()]} ${now.getFullYear()}`, 540, 1048);

  return new Promise(res => canvas.toBlob(res, 'image/png', 0.95));
}
