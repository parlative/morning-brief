<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maya's Brief">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon_1024.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon_1024.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./icon_1024.png">
  <link rel="apple-touch-icon" sizes="1024x1024" href="./icon_1024.png">
  <title>Maya's Morning Brief</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --subtext: #6e6e73;
      --accent: #ff9f0a;
      --accent2: #30d158;
      --accent3: #0a84ff;
      --accent4: #ff375f;
      --border: #e5e5ea;
      --shadow: 0 2px 14px rgba(0,0,0,0.07);
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      padding-top: 0;
      padding-bottom: calc(env(safe-area-inset-bottom) + 68px);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Tab bar ── */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid rgba(0,0,0,0.12);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 6px;
      background: none;
      border: none;
      cursor: pointer;
      gap: 2px;
      transition: opacity 0.15s;
      min-height: 49px;
    }
    .tab-btn:active { opacity: 0.5; }
    .tab-icon { font-size: 24px; line-height: 1; }
    .tab-label { font-size: 10px; font-weight: 500; color: var(--subtext); letter-spacing: 0.2px; }
    .tab-btn.active .tab-label { color: var(--accent3); font-weight: 600; }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Header (sticky) ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 90;
      background: linear-gradient(160deg, #fff8ec 0%, #fffdf5 60%, #f0f8ff 100%);
      padding: 14px 14px 16px;
      padding-top: max(env(safe-area-inset-top), 14px);
      text-align: center;
      border-bottom: 0.5px solid var(--border);
      backdrop-filter: saturate(180%) blur(10px);
      -webkit-backdrop-filter: saturate(180%) blur(10px);
    }
    .header-btn-row { display: none; } /* removed global buttons */
    /* pull-to-refresh indicator — hidden, functionality kept */
    .ptr-indicator { display: none !important; }
    .header-deco {
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #c0a060; margin-bottom: 6px; font-weight: 600;
    }
    .greeting { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); line-height: 1.2; }
    .greeting .sun { display: inline-block; animation: sway 4s ease-in-out infinite; }
    @keyframes sway { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
    .date-line { font-size: 15px; color: var(--subtext); margin-top: 5px; font-weight: 500; }
    .last-update-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; }
    .last-update { font-size: 11px; color: #bbb; }
    .refresh-btn {
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; color: #bbb;
      border: none; border-radius: 50%;
      width: 26px; height: 26px; font-size: 16px;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0; padding: 0;
    }
    .refresh-btn:active { opacity: 0.5; transform: scale(0.9); }
    .refresh-btn.loading { opacity: 0.35; pointer-events: none; }
    .spin { display: inline-block; }
    .refresh-btn.loading .spin { animation: spinning 0.7s linear infinite; }
    @keyframes spinning { to { transform: rotate(360deg); } }
    .offline-badge { display:none; background:#ff9f0a22; color:#b06000; border:1px solid #ff9f0a55; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; margin:6px auto 0; width:fit-content; }
    .offline-badge.visible { display: block; }
    .refresh-btn {
      display: inline-flex; align-items: center; justify-content: center;
      background: #e8f0fe; color: #1a56cc;
      border: 1px solid #b0ccf8; border-radius: 50%;
      width: 34px; height: 34px; font-size: 17px;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .refresh-btn:active { opacity: 0.7; transform: scale(0.9); }
    .refresh-btn.loading { opacity: 0.45; pointer-events: none; }
    .spin { display: inline-block; }
    .refresh-btn.loading .spin { animation: spinning 0.7s linear infinite; }
    @keyframes spinning { to { transform: rotate(360deg); } }
    .global-share-btn { display: none; }

    /* ── Animations ── */
    @keyframes fadeSlideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes tempPop { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} 60%{transform:translateY(-3px)} }
    @keyframes borderGlow {
      0%,100%{box-shadow:0 2px 14px rgba(0,0,0,0.07),0 0 0 0 rgba(100,150,255,0)}
      50%{box-shadow:0 2px 14px rgba(0,0,0,0.07),0 0 0 4px rgba(100,150,255,0.18)}
    }
    @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.5} }

    /* ── Cards ── */
    .content { padding: 12px 12px 0; max-width: 430px; margin: 0 auto; }
    /* Spacer so content starts below sticky header */
    .header-spacer { height: 0; }
    #page-today .content { padding-top: 12px; }
    /* The spacer height is set dynamically by JS after header renders */
    .card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 15px;
      margin-bottom: 10px; border: 1px solid var(--border);
      animation: fadeSlideUp 0.4s ease both;
    }
    .card-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--subtext); margin-bottom: 11px; }

    /* ── Holiday ── */
    .holiday-card { background: linear-gradient(135deg,#fff8dc,#fff0a0); border-color:#f0c840; }
    .holiday-emoji { font-size: 36px; margin-bottom: 6px; }
    .holiday-name { font-size: 21px; font-weight: 700; color: #6a4200; }
    .holiday-type { font-size: 13px; color: #9a6010; margin-top: 4px; font-weight: 500; }

    /* ── Birthday ── */
    .birthday-card { background: linear-gradient(135deg,#fff0f5,#fce4ec); border-color:#ffb3c6; }
    .birthday-top { display: flex; align-items: center; gap: 14px; }
    .birthday-days { font-size: 56px; font-weight: 800; color: var(--accent4); line-height: 1; letter-spacing: -3px; animation: bounce 2.5s ease-in-out infinite; }
    .birthday-right .birthday-label { font-size: 15px; color: #b03050; font-weight: 600; line-height: 1.4; }
    .birthday-right .birthday-sub { font-size: 13px; color: #c06080; margin-top: 3px; }

    /* ── Weather ── */
    .weather-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; }
    .weather-temp-big { font-size: 60px; font-weight: 200; letter-spacing: -3px; color: var(--text); line-height: 1; display: inline-block; animation: tempPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
    .weather-icon-big { font-size: 56px; line-height: 1; }
    .weather-desc { font-size: 16px; color: var(--text); font-weight: 600; margin-top: 4px; }
    .weather-feels { font-size: 13px; color: var(--subtext); margin-top: 2px; }
    .weather-location { font-size: 12px; color: var(--subtext); margin-top: 2px; }
    .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .w-item { background: var(--bg); border-radius: 13px; padding: 11px 13px; }
    .w-item-label { font-size: 11px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .w-item-val { font-size: 17px; font-weight: 600; color: var(--text); }
    .w-item-sub { font-size: 12px; color: var(--subtext); margin-top: 2px; }
    .minmax-row { display: flex; gap: 9px; margin-top: 9px; }
    .mm-pill { flex:1; border-radius:13px; padding:10px 12px; text-align:center; }
    .mm-pill span { font-size:11px; color:var(--subtext); display:block; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
    .mm-pill strong { font-size: 22px; font-weight: 700; }
    .mm-min { background: #e8f4ff; } .mm-min strong { color: var(--accent3); }
    .mm-max { background: #fff0f0; } .mm-max strong { color: var(--accent4); }

    /* ── UV Index bar ── */
    .uv-row { margin-top: 10px; }
    .uv-label-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--subtext); margin-bottom: 5px; }
    .uv-bar-bg { height: 8px; border-radius: 4px; background: linear-gradient(to right,#30d158,#ffd60a,#ff9f0a,#ff375f,#bf5af2); overflow: visible; position: relative; }
    .uv-marker { width: 14px; height: 14px; border-radius: 50%; background: #fff; border: 2px solid #333; position: absolute; top: -3px; transform: translateX(-50%); transition: left 0.6s ease; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }

    /* ── Weekly forecast ── */
    .week-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .week-row::-webkit-scrollbar { display: none; }
    .week-day { flex: 0 0 auto; background: var(--bg); border-radius: 13px; padding: 10px 8px; text-align: center; min-width: 52px; }
    .week-day.today { background: #e8f0fe; border: 1.5px solid #b0ccf8; }
    .week-day-name { font-size: 11px; font-weight: 700; color: var(--subtext); text-transform: uppercase; }
    .week-day-icon { font-size: 22px; margin: 5px 0; }
    .week-day-max { font-size: 14px; font-weight: 700; color: var(--text); }
    .week-day-min { font-size: 12px; color: var(--subtext); margin-top: 2px; }

    /* ── Steps ── */
    .steps-card { background: linear-gradient(135deg,#f0fff4,#e6ffee); border-color: #86efac; }
    .steps-ring-wrap { display: flex; align-items: center; gap: 16px; }
    .steps-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
    .steps-ring svg { transform: rotate(-90deg); }
    .steps-ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .steps-ring-pct { font-size: 15px; font-weight: 800; color: #16a34a; }
    .steps-ring-label { font-size: 9px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .steps-info { flex: 1; }
    .steps-count { font-size: 28px; font-weight: 800; color: #16a34a; letter-spacing: -1px; line-height: 1; }
    .steps-goal { font-size: 13px; color: #4ade80; font-weight: 500; margin-top: 3px; }
    .steps-extra { font-size: 12px; color: #059669; margin-top: 4px; font-weight: 600; }
    .steps-btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .steps-btn { flex: 1; background: #dcfce7; color: #16a34a; border: 1.5px solid #86efac; border-radius: 12px; padding: 8px 0; font-size: 13px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
    .steps-btn:active { transform: scale(0.95); }
    .steps-btn.minus { background: #fff; color: #6b7280; border-color: #d1d5db; }
    .steps-reset { margin-top: 6px; width: 100%; background: none; border: none; color: #9ca3af; font-size: 11px; cursor: pointer; padding: 4px; }
    /* manual input row */
    .steps-input-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    .steps-input { flex: 1; background: #fff; border: 1.5px solid #86efac; border-radius: 12px; padding: 9px 12px; font-size: 16px; font-weight: 600; color: var(--text); text-align: center; outline: none; -webkit-appearance: none; }
    .steps-input:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.15); }
    .steps-set-btn { background: #16a34a; color: #fff; border: none; border-radius: 12px; padding: 9px 18px; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.15s; flex-shrink: 0; }
    .steps-set-btn:active { transform: scale(0.95); opacity: 0.85; }
    .steps-hint { font-size: 11px; color: #9ca3af; text-align: center; margin-top: 5px; }
    /* calorie panels */
    .kcal-divider { height: 1px; background: #bbf7d0; margin: 14px 0; }
    .kcal-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 2px; }
    .kcal-panel { border-radius: 13px; padding: 12px; }
    .kcal-panel.gym  { background: #fff7ed; border: 1.5px solid #fdba74; }
    .kcal-panel.rest { background: #eff6ff; border: 1.5px solid #93c5fd; }
    .kcal-panel-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .kcal-panel.gym  .kcal-panel-title { color: #c2410c; }
    .kcal-panel.rest .kcal-panel-title { color: #1d4ed8; }
    .kcal-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .kcal-label { font-size: 11px; color: var(--subtext); }
    .kcal-val { font-size: 14px; font-weight: 700; color: var(--text); }
    .kcal-extra-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .kcal-extra-label { font-size: 11px; color: #059669; }
    .kcal-extra-val { font-size: 14px; font-weight: 700; color: #059669; }
    .kcal-total-row { border-top: 1px solid rgba(0,0,0,0.08); margin-top: 6px; padding-top: 6px; display: flex; justify-content: space-between; align-items: baseline; }
    .kcal-total-label { font-size: 11px; font-weight: 700; color: var(--text); }
    .kcal-panel.gym  .kcal-total-val { font-size: 18px; font-weight: 800; color: #ea580c; }
    .kcal-panel.rest .kcal-total-val { font-size: 18px; font-weight: 800; color: #2563eb; }
    .kcal-note { font-size: 10px; color: #9ca3af; text-align: center; margin-top: 8px; }

    /* ── News ── */
    .news-item { padding:11px 0; border-bottom:1px solid var(--border); display:flex; gap:11px; align-items:flex-start; }
    .news-item:last-child { border-bottom:none; padding-bottom:0; }
    .news-num { font-size:12px; font-weight:700; color:#fff; background:var(--text); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
    .news-text { font-size:14px; line-height:1.5; font-weight:500; color:var(--text); }
    .news-source { font-size:11px; color:var(--subtext); margin-top:3px; }
    .war-card { border-left: 4px solid var(--accent4); }
    .war-card .news-num { background: var(--accent4); }
    .live-dot { display:inline-block; width:7px; height:7px; background:var(--accent4); border-radius:50%; margin-right:5px; animation:pulse-dot 1.8s ease-in-out infinite; vertical-align:middle; position:relative; top:-1px; }

    /* ── Word of Day ── */
    .word-card { background: linear-gradient(135deg,#f0f4ff,#e8edff); border-color: #c7d2fe; }
    .word-main { font-size: 28px; font-weight: 800; color: #3730a3; letter-spacing: -0.5px; }
    .word-phonetic { font-size: 13px; color: #818cf8; margin-top: 2px; }
    .word-pos { display: inline-block; background: #e0e7ff; color: #4338ca; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 6px; }
    .word-def { font-size: 14px; line-height: 1.55; color: #3730a3; font-weight: 500; }
    .word-example { font-size: 13px; color: #6366f1; margin-top: 7px; font-style: italic; }
    .word-de { font-size: 13px; color: #818cf8; margin-top: 5px; }

    /* ── History ── */
    .history-card { background: linear-gradient(135deg,#fdf4ff,#f5e9ff); border-color: #e9d5ff; }
    .history-year { font-size: 42px; font-weight: 800; color: #7c3aed; letter-spacing: -2px; line-height: 1; }
    .history-text { font-size: 15px; line-height: 1.55; color: #5b21b6; font-weight: 500; margin-top: 6px; }
    .history-ago { font-size: 12px; color: #a78bfa; margin-top: 5px; font-weight: 600; }

    /* ── Motivation ── */
    .motivation-card { background: linear-gradient(135deg,#e8f0ff,#f0f5ff); border-color: #a0b8f0; animation: fadeSlideUp 0.4s ease both, borderGlow 4s ease-in-out infinite 0.4s; }
    .motivation-emoji { font-size: 32px; margin-bottom: 8px; }
    .motivation-quote { font-size: 17px; font-weight: 600; line-height: 1.55; color: #1a3a7a; font-style: italic; }
    .motivation-translation { font-size: 13px; color: #5a7ab0; margin-top: 7px; line-height: 1.5; font-style: normal; font-weight: 400; }
    .motivation-author { font-size: 13px; color: #4a7acc; margin-top: 9px; font-weight: 600; }

    /* ── Evening Summary page ── */
    .summary-header { background: linear-gradient(160deg,#1a1a2e,#16213e,#0f3460); padding: 36px 20px 24px; text-align: center; position: relative; }
    .summary-title { font-size: 26px; font-weight: 700; color: #fff; }
    .summary-sub { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 6px; }
    .summary-stars { font-size: 20px; margin-top: 8px; letter-spacing: 4px; }
    .summary-content { padding: 14px; max-width: 480px; margin: 0 auto; }
    .summary-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; margin-bottom: 14px; border: 1px solid var(--border); animation: fadeSlideUp 0.4s ease both; }
    .summary-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--subtext); margin-bottom: 12px; }
    .summary-unavail { font-size: 14px; color: var(--subtext); text-align: center; padding: 16px 0; }
    .recap-item { display: flex; gap: 10px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .recap-item:last-child { border-bottom: none; padding-bottom: 0; }
    .recap-num { font-size: 11px; font-weight: 700; color: #fff; background: #7c3aed; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .recap-text { font-size: 14px; line-height: 1.5; color: var(--text); font-weight: 500; }
    .weather-recap-row { display: flex; justify-content: space-around; text-align: center; padding: 6px 0; }
    .wr-item span { display: block; font-size: 11px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .wr-item strong { font-size: 20px; font-weight: 700; color: var(--text); }
    .steps-recap { display: flex; align-items: center; justify-content: space-between; }
    .steps-recap-num { font-size: 40px; font-weight: 800; color: #16a34a; letter-spacing: -2px; }
    .steps-recap-info { text-align: right; }
    .steps-recap-info span { display: block; font-size: 13px; color: var(--subtext); }
    .steps-recap-info strong { font-size: 15px; font-weight: 700; color: var(--text); }

    /* ── Share button ── */
    .share-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: none; border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px;
      font-size: 11px; font-weight: 600; color: var(--subtext);
      cursor: pointer; float: right; margin-top: -2px;
      transition: background 0.15s;
    }
    .share-btn:active { background: var(--bg); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 13px; }
    .card-header .card-title { margin-bottom: 0; }
    /* global share — defined above in header section */

    /* ── Photo of the Day ── */
    .photo-card { padding: 0; overflow: hidden; }
    .photo-card .card-title { padding: 14px 18px 0; margin-bottom: 10px; }
    .photo-gallery { display: flex; gap: 8px; overflow-x: auto; padding: 0 18px 14px; scrollbar-width: none; }
    .photo-gallery::-webkit-scrollbar { display: none; }
    .photo-item { flex: 0 0 auto; position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; }
    .photo-item img { width: 160px; height: 160px; object-fit: cover; display: block; transition: transform 0.3s; }
    .photo-item:active img { transform: scale(0.97); }
    .photo-caption { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); color: #fff; font-size: 10px; padding: 18px 8px 6px; font-weight: 500; line-height: 1.3; }
    .photo-tag { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.5); color: #fff; font-size: 9px; font-weight: 700; border-radius: 6px; padding: 2px 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    /* lightbox */

<script>
// ═══════════════════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════════════════
// ── VAPID Public Key (für Web Push) ──────────────────────────────────
const VAPID_PUBLIC_KEY = 'BJtHjlU94cINezIzs2rK9EQDdFxLYr7zhhWtCk9JR5WRUwho-VDJ8l2GTPt7VTETl123WLLubqxsVOHqUHoQb1U';

// Cloudflare Worker Endpoint (sendet Push + speichert Subscriptions)
const PUSH_SERVER = 'https://maya-brief-push.parlative.workers.dev';

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    // Lausche auf PUSH_REFRESH vom Service Worker
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'PUSH_REFRESH') {
        loadAll(false);
        showToast('🔄 Brief aktualisiert!');
      }
    });
    // Auto-Subscribe wenn Notifications erlaubt
    if (Notification.permission === 'granted') {
      subscribePush(reg);
    }
  }).catch(() => {});
}

// ── Push Subscription ────────────────────────────────────────────────
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function subscribePush(reg) {
  try {
    reg = reg || await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    // Schicke Subscription an Cloudflare Worker
    await fetch(PUSH_SERVER + '/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sub)
    });
    return sub;
  } catch(e) {
    console.warn('Push subscribe failed:', e);
  }
}

async function requestPushPermission() {
  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    showToast('❌ Push nicht unterstützt');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    const reg = await navigator.serviceWorker.ready;
    await subscribePush(reg);
    showToast('🔔 Benachrichtigungen aktiviert!');
  } else {
    showToast('❌ Benachrichtigungen abgelehnt');
  }
}

// ═══════════════════════════════════════════════════════
// HAPTIC FEEDBACK
// ═══════════════════════════════════════════════════════
function haptic(style = 'light') {
  if (window.navigator && window.navigator.vibrate) {
    const ms = style === 'heavy' ? 30 : style === 'medium' ? 15 : 8;
    window.navigator.vibrate(ms);
  }
}

  const badge = document.getElementById('offline-badge');
  if (!navigator.onLine) badge.classList.add('visible');
  else badge.classList.remove('visible');
}
window.addEventListener('online', updateOfflineStatus);
window.addEventListener('offline', updateOfflineStatus);

// Push-Banner anzeigen wenn noch keine Permission
function updatePushBanner() {
  const banner = document.getElementById('push-banner');
  if (!banner) return;
  if ('Notification' in window && Notification.permission === 'default' && 'serviceWorker' in navigator) {
    banner.style.display = 'block';

    banner.style.display = 'none';

function updateGreeting() {
  const h = new Date().getHours();

  if (h < 10)  { text = "Good Morning, Maya"; emoji = "☀️"; }
  else         { text = "Hello, Maya"; emoji = h < 18 ? "👋" : "🌙"; }
  document.getElementById('greeting').innerHTML = `${text} <span class="sun">${emoji}</span>`;
  const now = new Date();
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

}

function easterDate(y) {
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;
  return new Date(y,mo-1,dy);
}

// STEP COUNTER
// ═══════════════════════════════════════════════════════
const STEP_GOAL = 6000;
const STEP_KEY = 'maya_steps_';
const KCAL_PER_1000 = 25;       // kcal pro 1.000 Schritte über Ziel
const KCAL_GYM  = 1700;         // Basis Gymday
const KCAL_REST = 1500;         // Basis Ruhetag

function todayKey() {
  const n=new Date();
  return `${n.getFullYear()}-${n.getMonth()}-${n.getDate()}`;
}
function getSteps() {
  const saved = localStorage.getItem(STEP_KEY + todayKey());
  return saved ? parseInt(saved) : 0;
}
function saveSteps(n) {
  localStorage.setItem(STEP_KEY + todayKey(), n);
}
function extraCalories(steps) {
  if(steps <= STEP_GOAL) return 0;
  return Math.floor((steps - STEP_GOAL) / 1000) * KCAL_PER_1000;
}

function renderSteps() {
  const steps = getSteps();
  const pct = Math.min(steps / STEP_GOAL, 1);
  const extra = extraCalories(steps);
  const r = 34, circ = 2 * Math.PI * r;
  const dash = pct * circ;
  const color = pct >= 1 ? '#16a34a' : pct >= 0.6 ? '#22c55e' : '#86efac';

  const totalGym  = KCAL_GYM  + extra;
  const totalRest = KCAL_REST + extra;
  const extraLine = extra > 0
    ? `<div class="kcal-extra-row">
         <span class="kcal-extra-label">+${KCAL_PER_1000} kcal/1k Schritte 🔥</span>
         <span class="kcal-extra-val">+${extra}</span>
       </div>`
    : `<div class="kcal-extra-row">
         <span class="kcal-extra-label" style="color:#9ca3af">Extra Schritte</span>
         <span class="kcal-extra-val" style="color:#9ca3af">+0</span>
       </div>`;

  document.getElementById('steps-section').innerHTML = `
    <div class="card steps-card">
      <div class="card-title">👟 Schrittzähler · Tagesziel</div>
      <div class="steps-ring-wrap">
        <div class="steps-ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="${r}" fill="none" stroke="#dcfce7" stroke-width="7"/>
            <circle cx="40" cy="40" r="${r}" fill="none" stroke="${color}" stroke-width="7"
              stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
              stroke-linecap="round" style="transition:stroke-dasharray 0.5s ease"/>
          </svg>
          <div class="steps-ring-center">
            <span class="steps-ring-pct">${Math.round(pct*100)}%</span>
            <span class="steps-ring-label">Ziel</span>
          </div>
        </div>
        <div class="steps-info">
          <div class="steps-count">${steps.toLocaleString('de-DE')}</div>
          <div class="steps-goal">Ziel: ${STEP_GOAL.toLocaleString('de-DE')} Schritte</div>
          ${extra > 0 ? `<div class="steps-extra">+${extra} kcal Extra 🔥</div>` : ''}
          ${steps >= STEP_GOAL
            ? `<div class="steps-extra">✅ Ziel erreicht!</div>`
            : `<div class="steps-goal" style="color:#9ca3af">${(STEP_GOAL-steps).toLocaleString('de-DE')} noch</div>`}
        </div>
      </div>

      <!-- Calorie panels -->
      <div class="kcal-divider"></div>
      <div class="kcal-panels">
        <div class="kcal-panel gym">
          <div class="kcal-panel-title">🏋️ Gymday</div>
          <div class="kcal-row">
            <span class="kcal-label">Basis</span>
            <span class="kcal-val">${KCAL_GYM}</span>
          </div>
          ${extraLine}
          <div class="kcal-total-row">
            <span class="kcal-total-label">Gesamt</span>
            <span class="kcal-total-val">${totalGym} kcal</span>
          </div>
        </div>
        <div class="kcal-panel rest">
          <div class="kcal-panel-title">🛋️ Restday</div>
          <div class="kcal-row">
            <span class="kcal-label">Basis</span>
            <span class="kcal-val">${KCAL_REST}</span>
          </div>
          ${extraLine}
          <div class="kcal-total-row">
            <span class="kcal-total-label">Gesamt</span>
            <span class="kcal-total-val">${totalRest} kcal</span>
          </div>
        </div>
      </div>
      <div class="kcal-note">+${KCAL_PER_1000} kcal pro 1.000 Schritte über ${STEP_GOAL.toLocaleString('de-DE')} hinaus</div>

      <!-- Quick +/− buttons -->
      <div class="steps-btn-row" style="margin-top:14px">
        <button class="steps-btn minus" onclick="adjustSteps(-1000); haptic('medium')">−1.000</button>
        <button class="steps-btn minus" onclick="adjustSteps(-500); haptic()">−500</button>
        <button class="steps-btn" onclick="adjustSteps(500); haptic()">+500</button>
        <button class="steps-btn" onclick="adjustSteps(1000); haptic('medium')">+1.000</button>
      </div>

      <!-- Manual input -->
      <div class="steps-input-row">
        <input
          class="steps-input"
          id="steps-manual-input"
          type="number"
          inputmode="numeric"
          pattern="[0-9]*"
          placeholder="z.B. 8432"
          min="0" max="99999"
          onkeydown="if(event.key==='Enter'){setStepsManual();}"
        />
        <button class="steps-set-btn" onclick="setStepsManual(); haptic('medium')">✓ Setzen</button>
      </div>
      <div class="steps-hint">📱 Apple Watch → Aktivität → Schritte → hier eingeben</div>

      <button class="steps-reset" onclick="if(confirm('Schritte zurücksetzen?')){saveSteps(0);haptic('heavy');renderSteps();}">↺ Zurücksetzen</button>
    </div>`;
}

function adjustSteps(delta) {
  const n = Math.max(0, getSteps() + delta);
  saveSteps(n);
  renderSteps();
}

function setStepsManual() {
  const input = document.getElementById('steps-manual-input');
  if (!input) return;
  // Accept both comma and dot as thousands separator, strip non-digits
  const raw = input.value.replace(/[^\d]/g, '');
  const n = parseInt(raw, 10);
  if (isNaN(n) || n < 0) return;
  const clamped = Math.min(n, 99999);
  saveSteps(clamped);
  renderSteps();
}

function wIcon(c){if(c===0)return'☀️';if(c<=2)return'⛅';if(c===3)return'☁️';if(c<=49)return'🌫️';if(c<=57)return'🌦️';if(c<=67)return'🌧️';if(c<=77)return'❄️';if(c<=82)return'🌦️';if(c<=86)return'🌨️';if(c<=99)return'⛈️';return'🌤️';}
function wDesc(c){if(c===0)return'Strahlend klar';if(c<=2)return'Teils bewölkt';if(c===3)return'Bedeckt';if(c<=49)return'Nebelig';if(c<=57)return'Nieselregen';if(c<=67)return'Regnerisch';if(c<=77)return'Schneefall';if(c<=82)return'Regenschauer';if(c<=86)return'Schneeschauer';if(c<=99)return'Gewitter ⚡';return'–';}
function uvLabel(uv){if(uv<=2)return{l:'Niedrig',c:'#30d158'};if(uv<=5)return{l:'Moderat',c:'#ffd60a'};if(uv<=7)return{l:'Hoch',c:'#ff9f0a'};if(uv<=10)return{l:'Sehr hoch',c:'#ff375f'};return{l:'Extrem',c:'#bf5af2'};}

let _weatherCache = null; // for summary page

async function loadWeather() {
  try {
    let lat=50.11, lon=8.68, city='Frankfurt';
    try {
      // Try ipwho.is first (no rate limit), fallback to ip-api.com
      const geo = await fetch('https://ipwho.is/', {signal: AbortSignal.timeout(5000)}).then(r=>r.json());
      if (geo.success !== false && geo.latitude) {
        lat = geo.latitude; lon = geo.longitude; city = geo.city || city;
      } else {
        const geo2 = await fetch('http://ip-api.com/json/?fields=city,lat,lon', {signal: AbortSignal.timeout(5000)}).then(r=>r.json());
        if (geo2.lat) { lat = geo2.lat; lon = geo2.lon; city = geo2.city || city; }
      }
    } catch {}
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      +`&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code,precipitation,uv_index`
      +`&hourly=precipitation,precipitation_probability,weather_code`
      +`&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weather_code,uv_index_max`
      +`&timezone=auto&forecast_days=7`;
    const data=await fetch(url).then(r=>r.json());
    const c=data.current, d=data.daily, h=data.hourly;
    _weatherCache = {c, d, city};

    const temp=Math.round(c.temperature_2m), feels=Math.round(c.apparent_temperature);
    const humid=c.relative_humidity_2m, wind=Math.round(c.wind_speed_10m), code=c.weather_code;
    const maxT=Math.round(d.temperature_2m_max[0]), minT=Math.round(d.temperature_2m_min[0]);
    const precSum=d.precipitation_sum[0], precPro=d.precipitation_probability_max[0];
    const uv=Math.round(c.uv_index||0), uvInfo=uvLabel(uv);
    const uvPct=Math.min(uv/11,1)*100;

    // Stündliche Regenvorhersage: heute ab jetzt, sonst morgen
    const nowLocal = new Date();
    const nowHour = nowLocal.getHours();
    const pad2 = n => String(n).padStart(2,'0');
    const todayLocal = `${nowLocal.getFullYear()}-${pad2(nowLocal.getMonth()+1)}-${pad2(nowLocal.getDate())}`;
    const tomorrowDate = new Date(nowLocal); tomorrowDate.setDate(tomorrowDate.getDate()+1);
    const tomorrowLocal = `${tomorrowDate.getFullYear()}-${pad2(tomorrowDate.getMonth()+1)}-${pad2(tomorrowDate.getDate())}`;

    const rainToday = [], rainTomorrow = [];
    if (h && h.time) {
      h.time.forEach((t, i) => {
        const mm = h.precipitation[i] || 0;
        const prob = h.precipitation_probability ? h.precipitation_probability[i] : null;
        const hasRain = mm > 0.05 || (prob && prob >= 30);
        if (!hasRain) return;
        if (t.startsWith(todayLocal)) {
          const hr = parseInt(t.slice(11,13));
          if (hr >= nowHour) rainToday.push({ hr, mm, prob, label: `${pad2(hr)}:00 Uhr` });
        } else if (t.startsWith(tomorrowLocal)) {
          const hr = parseInt(t.slice(11,13));
          rainTomorrow.push({ hr, mm, prob, label: `Morgen ${pad2(hr)}:00 Uhr` });
        }
      });
    }

    let rainHtml = '';
    const rainSource = rainToday.length ? rainToday : rainTomorrow;
    const rainLabel = rainToday.length ? '☔ Regen heute um:' : '☔ Regen morgen um:';
    if (rainSource.length) {
      const rows = rainSource.slice(0,8).map(r =>
        `<div class="rain-slot">
          <span class="rain-time">${r.label}</span>
          <span class="rain-mm">${r.mm>0.05 ? r.mm.toFixed(1)+' mm' : '–'}</span>
          ${r.prob!=null ? `<span class="rain-prob">${r.prob}%</span>` : ''}
        </div>`
      ).join('');
      rainHtml = `<div class="rain-forecast"><div class="w-item-label" style="margin-bottom:7px;font-size:12px;color:#1d4ed8;font-weight:700">${rainLabel}</div><div class="rain-slots">${rows}</div></div>`;
    } else {
      rainHtml = `<div class="rain-forecast" style="background:#f0fff4;"><div class="w-item-label" style="color:#16a34a;font-size:12px">🌵 Kein Regen in den nächsten 48h erwartet</div></div>`;
    }

    document.getElementById('weather-section').innerHTML=`
      <div class="card">
        <div class="card-header">
          <div class="card-title">🌡️ Wetter · 📍 ${city}</div>
          <button class="share-btn" onclick="shareCard('weather-section','🌡️','Wetter')">⎙ Teilen</button>
        </div>
        <div class="weather-top">
          <div>
            <div class="weather-temp-big">${temp}°</div>
            <div class="weather-desc">${wDesc(code)}</div>
            <div class="weather-feels">🌡️ Gefühlt ${feels}°</div>
            <div class="weather-location">📍 ${city}</div>
          </div>
          <div class="weather-icon-big">${wIcon(code)}</div>

        <div class="weather-grid">
          <div class="w-item">
            <div class="w-item-label">💧 Niederschlag</div>
            <div class="w-item-val">${precSum>0?precSum.toFixed(1)+' mm':'Keiner 🌵'}</div>
            <div class="w-item-sub">☔ ${precPro}% Wahrsch.</div>
          </div>
          <div class="w-item">
            <div class="w-item-label">💨 Wind</div>
            <div class="w-item-val">${wind} km/h</div>
            <div class="w-item-sub">🌬️ Windgeschwindigkeit</div>
          </div>
          <div class="w-item">
            <div class="w-item-label">🌊 Luftfeuchtigkeit</div>
            <div class="w-item-val">${humid}%</div>
          </div>
          <div class="w-item">
            <div class="w-item-label">🌡️ Aktuell / Gefühlt</div>
            <div class="w-item-val">${temp}° / ${feels}°</div>

        <div class="minmax-row">
          <div class="mm-pill mm-min"><span>🥶 Minimum</span><strong>${minT}°</strong></div>

        <div class="uv-row">

            <span>☀️ UV-Index: <strong style="color:${uvInfo.c}">${uv} — ${uvInfo.l}</strong></span>

          </div>
          <div class="uv-bar-bg">
            <div class="uv-marker" style="left:${uvPct}%"></div>
          </div>
        </div>
      </div>`;

    // Weekly forecast with share button
    const dayNames=['So','Mo','Di','Mi','Do','Fr','Sa'];
    const weekHtml=d.time.map((dateStr,i)=>{
      const dt=new Date(dateStr+'T12:00:00');
      const isToday=i===0;
      return `<div class="week-day${isToday?' today':''}">
        <div class="week-day-name">${isToday?'Heute':dayNames[dt.getDay()]}</div>
        <div class="week-day-icon">${wIcon(d.weather_code[i])}</div>

    document.getElementById('week-section').innerHTML=`

// RSS via rss2json OHNE count-Parameter (kein API-Key nötig), max 10 items
async function fetchRSS(feedUrl, src) {
  // rss2json ohne count → funktioniert kostenlos
  const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&_=${Date.now()}`;
  const data = await fetch(url, {signal: AbortSignal.timeout(10000)}).then(r => r.json());
  if (data.status === 'ok' && data.items?.length) {
    return data.items.slice(0, 10).map(i => ({
      title: i.title?.trim() || '',
      pubDate: i.pubDate || new Date().toISOString(),
      src
    })).filter(i => i.title);
  }
  return null;
}

// Englischen Text ins Deutsche übersetzen via MyMemory (kostenlos)
async function translateToDE(text) {
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|de`;
    const data = await fetch(url, {signal: AbortSignal.timeout(5000)}).then(r => r.json());
    const t = data?.responseData?.translatedText;
    if (t && t !== text && !t.toLowerCase().includes('please select')) return t;
  } catch {}
  return text;
}

async function loadNews() {
  // Nur funktionierende deutsche Feeds (getestet)
  const feeds = [
    { url: 'https://www.n-tv.de/rss', src: 'n-tv.de' },
    { url: 'https://www.spiegel.de/schlagzeilen/tops/index.rss', src: 'spiegel.de' },
  ];

  for (const feed of feeds) {
    try {
      const items = await fetchRSS(feed.url, feed.src);
      if (!items || !items.length) continue;
      const top5 = items.slice(0, 5);
      const html = top5.map((item, i) => `
        <div class="news-item">
          <div class="news-num">${i+1}</div>
          <div>
            <div class="news-text">${item.title}</div>
            <div class="news-source">📺 ${item.src} · 🕐 ${new Date(item.pubDate).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} Uhr</div>
          </div>
        </div>`).join('');
      document.getElementById('news-section').innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title">📰 Breaking News</div>
            <button class="share-btn" onclick="shareCard('news-section','📰','Breaking News')">⎙ Teilen</button>
          </div>
          ${html}
        </div>`;
      return;
    } catch { continue; }
  }
  document.getElementById('news-section').innerHTML = `<div class="card"><div class="card-title">📰 Breaking News</div><p class="error-msg">📴 Nicht verfügbar</p></div>`;
}

async function loadWarNews() {
  // Getestete funktionierende Feeds; englische werden übersetzt
  const feeds = [
    { url: 'https://www.n-tv.de/rss',                                 src: 'n-tv.de',      lang: 'de' },
    { url: 'https://www.spiegel.de/schlagzeilen/tops/index.rss',      src: 'spiegel.de',   lang: 'de' },
    { url: 'https://feeds.bbci.co.uk/news/world/rss.xml',             src: 'bbc.com',       lang: 'en' },
    { url: 'https://rss.nytimes.com/services/xml/rss/nyt/World.xml',  src: 'nytimes.com',   lang: 'en' },
  ];
  const kw = [
    'israel','iran','hamas','hezbollah','gaza','west bank','westjordanland',
    'netanyahu','netanjahu','idf','irgc','tehran','teheran',
    'nahost','middle east','war','krieg','conflict','konflikt',
    'missile','rakete','strike','angriff','attack','ceasefire','waffenstillstand',
    'hostage','geisel','nuclear','nuklear','sanctions','sanktionen',
    'trump','pentagon','nato','ukraine','russland','russia','putin',
    'airstrikes','luftangriff','us troops','us military'
  ];

  const allItems = [];

  await Promise.allSettled(feeds.map(async feed => {
    try {
      const items = await fetchRSS(feed.url, feed.src);
      if (!items) return;
      const matched = items
        .filter(x => kw.some(k => (x.title).toLowerCase().includes(k)))
        .slice(0, 4)
        .map(x => ({ ...x, _src: feed.src, _lang: feed.lang }));
      // Fallback: bei deutschen Feeds trotzdem erste Items nehmen
      if (!matched.length && feed.lang === 'de') {
        allItems.push(...items.slice(0, 2).map(x => ({ ...x, _src: feed.src, _lang: feed.lang })));
      } else {
        allItems.push(...matched);
      }
    } catch {}
  }));

  allItems.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
  const seen = new Set();
  const deduped = allItems.filter(x => {
    const key = x.title.slice(0, 40).toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0, 5);

  if (!deduped.length) {
    document.getElementById('war-section').innerHTML =
      `<div class="card war-card"><div class="card-title">🔴 Israel · 🇺🇸 USA · 🇮🇷 Iran</div><p class="error-msg">📴 Keine Meldungen verfügbar</p></div>`;
    return;
  }

  // Englische Schlagzeilen auf Deutsch übersetzen
  const translated = await Promise.all(deduped.map(async item => ({
    ...item,
    title: item._lang === 'en' ? await translateToDE(item.title) : item.title
  })));

  const html = translated.map((item, i) => `
    <div class="news-item">
      <div class="news-num">${i+1}</div>
      <div>
        <div class="news-text">${item.title}</div>
        <div class="news-source">📡 ${item._src} · 🕐 ${new Date(item.pubDate).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} Uhr</div>
      </div>
    </div>`).join('');

  document.getElementById('war-section').innerHTML = `
    <div class="card war-card">
      <div class="card-header">
        <div class="card-title"><span class="live-dot"></span>Israel · 🇺🇸 USA · 🇮🇷 Iran</div>
        <button class="share-btn" onclick="shareCard('war-section','🔴','Israel · USA · Iran')">⎙ Teilen</button>
      </div>
      ${html}
    </div>`;
}

// html2canvas lazy-load
let _html2canvasLoaded = false;
async function loadHtml2Canvas() {
  if (_html2canvasLoaded) return;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = () => { _html2canvasLoaded = true; res(); };
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function captureCardAsBlob(cardId) {
  await loadHtml2Canvas();
  const el = document.getElementById(cardId)?.querySelector('.card') ||
             document.getElementById(cardId);
  if (!el) return null;
  const canvas = await html2canvas(el, {
    scale: 2,
    backgroundColor: '#ffffff',
    useCORS: true,
    logging: false,
  });
  return new Promise(res => canvas.toBlob(res, 'image/png'));
}

async function shareCard(cardId, emoji, title) {
  haptic('medium');
  // Show loading indicator
  const btn = event?.target?.closest('.share-btn');
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }

  try {
    const blob = await captureCardAsBlob(cardId);
    if (btn) { btn.textContent = '⎙ Teilen'; btn.disabled = false; }

    if (blob && navigator.share && navigator.canShare?.({ files: [new File([blob], 'brief.png', {type:'image/png'})] })) {
      // Native share with image (iOS/Android)
      await navigator.share({
        title: `${emoji} ${title} — Maya's Morning Brief`,
        files: [new File([blob], 'morning-brief.png', { type: 'image/png' })],
      });
    } else if (blob) {
      // Fallback: show custom sheet with image download + text share
      showImageShareSheet(blob, emoji, title, cardId);
    } else {
      // No canvas — fall back to text
      shareCardText(cardId, emoji, title);
    }
  } catch(e) {
    if (btn) { btn.textContent = '⎙ Teilen'; btn.disabled = false; }
    if (e.name !== 'AbortError') shareCardText(cardId, emoji, title);
  }
}

function showImageShareSheet(blob, emoji, title, cardId) {
  const existing = document.getElementById('custom-share-sheet');
  if (existing) existing.remove();

  const imgUrl = URL.createObjectURL(blob);
  const file = new File([blob], 'morning-brief.png', { type: 'image/png' });

  const sheet = document.createElement('div');
  sheet.id = 'custom-share-sheet';
  sheet.style.cssText = `
    position:fixed; inset:0; z-index:9999;
    display:flex; flex-direction:column; justify-content:flex-end;
    background:rgba(0,0,0,0.5);`;

  sheet.innerHTML = `
    <div style="background:#fff;border-radius:20px 20px 0 0;padding:20px 16px calc(env(safe-area-inset-bottom)+16px);max-height:80vh;overflow-y:auto;">

      <img src="${imgUrl}" style="width:100%;border-radius:12px;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,0.12);" />
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;">
        <button id="ss-native" style="background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;">
          <div style="width:52px;height:52px;border-radius:14px;background:#007aff;display:flex;align-items:center;justify-content:center;font-size:26px;">📤</div>
          <span style="font-size:11px;color:#333;font-weight:500;">Teilen</span>
        </button>
        <button id="ss-download" style="background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;">
          <div style="width:52px;height:52px;border-radius:14px;background:#34c759;display:flex;align-items:center;justify-content:center;font-size:26px;">💾</div>
          <span style="font-size:11px;color:#333;font-weight:500;">Speichern</span>
        </button>
        <button id="ss-instagram" style="background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;">
          <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);display:flex;align-items:center;justify-content:center;font-size:26px;">📸</div>
          <span style="font-size:11px;color:#333;font-weight:500;">Instagram</span>
        </button>
        <button id="ss-whatsapp" style="background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;">
          <div style="width:52px;height:52px;border-radius:14px;background:#25d366;display:flex;align-items:center;justify-content:center;font-size:26px;">💬</div>
          <span style="font-size:11px;color:#333;font-weight:500;">WhatsApp</span>
        </button>
      </div>
      <button id="ss-cancel" style="width:100%;background:#f2f2f7;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;color:#333;cursor:pointer;">Abbrechen</button>
    </div>`;

  document.body.appendChild(sheet);
  sheet.addEventListener('click', e => { if (e.target === sheet) { sheet.remove(); URL.revokeObjectURL(imgUrl); }});

  // Native share (with image file)
  document.getElementById('ss-native').onclick = async () => {
    try { await navigator.share({ title: `${emoji} ${title}`, files: [file] }); }
    catch(e) { if(e.name!=='AbortError') { await navigator.share({ title: `${emoji} ${title}`, text: `${emoji} ${title} — Maya's Morning Brief 🌅` }); } }
    sheet.remove(); URL.revokeObjectURL(imgUrl);
  };

  // Download / Foto speichern
  document.getElementById('ss-download').onclick = () => {
    const a = document.createElement('a');
    a.href = imgUrl; a.download = `morning-brief-${title.replace(/\s/g,'-')}.png`;
    a.click();
    showToast('💾 Bild gespeichert!');
    sheet.remove();
  };

  // Instagram — Bild in Zwischenablage + Instagram öffnen
  document.getElementById('ss-instagram').onclick = async () => {
    sheet.remove();
    // Versuche natives Share mit Bild
    try {
      await navigator.share({ files: [file] });
    } catch {
      // Fallback: Download + Instagram öffnen
      const a = document.createElement('a'); a.href = imgUrl; a.download = 'morning-brief.png'; a.click();
      setTimeout(() => { window.location.href = 'instagram://'; }, 500);
      showToast('📸 Bild gespeichert → Instagram öffnen → Bild einfügen');

      await navigator.share({ files: [file], title: `${emoji} ${title}` });
    } catch {
      window.open(`https://wa.me/?text=${encodeURIComponent(`${emoji} ${title} — Maya's Morning Brief 🌅`)}`, '_blank');

    URL.revokeObjectURL(imgUrl);
  };

  document.getElementById('ss-cancel').onclick = () => { sheet.remove(); URL.revokeObjectURL(imgUrl); };

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;white-space:nowrap;';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// INSTAGRAM-OPTIMIERTES BILD GENERIEREN (1:1 Canvas)
// ═══════════════════════════════════════════════════════
async function generateInstagramImage(type) {
  // type = 'quote' | 'history' | 'evening-quote'
  const canvas = document.createElement('canvas');
  canvas.width = 1080; canvas.height = 1080;
  const ctx = canvas.getContext('2d');

  const now = new Date();
  const doy = Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const dateStr = `${days[now.getDay()]}, ${now.getDate()}. ${months[now.getMonth()]} ${now.getFullYear()}`;

  if (type === 'quote') {
    const q = quotes[doy % quotes.length];
    // Gradient background
    const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
    grad.addColorStop(0, '#1a3a7a'); grad.addColorStop(1, '#0a84ff');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1080);
    // Decorative circle
    ctx.globalAlpha = 0.08;
    ctx.beginPath(); ctx.arc(900, 180, 300, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill(); ctx.globalAlpha = 1;
    // Emoji
    ctx.font = '90px serif'; ctx.textAlign = 'center';
    ctx.fillText(q.e, 540, 200);
    // Quote
    ctx.fillStyle = '#fff'; ctx.font = 'bold 52px -apple-system, Arial';
    wrapText(ctx, `"${q.t}"`, 540, 300, 920, 70);
    // Translation
    ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.font = '38px -apple-system, Arial';
    wrapText(ctx, `„${q.de}"`, 540, 750, 920, 52);
    // Author
    if (q.a) { ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = 'italic 34px -apple-system, Arial'; ctx.fillText(`— ${q.a}`, 540, 900); }
    // Watermark
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '26px -apple-system, Arial';
    ctx.fillText(`Maya's Morning Brief · ${dateStr}`, 540, 1040);

  } else if (type === 'history') {
    const key = `${now.getMonth()+1}-${now.getDate()}`;
    const entries = history[key];
    if (!entries || !entries.length) return null;
    const entry = entries[0];
    const ago = now.getFullYear() - entry.y;
    // Background
    const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
    grad.addColorStop(0, '#3b0764'); grad.addColorStop(1, '#7c3aed');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1080);
    // Deco
    ctx.globalAlpha = 0.07;
    ctx.beginPath(); ctx.arc(200, 900, 350, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill(); ctx.globalAlpha = 1;
    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = 'bold 30px -apple-system, Arial'; ctx.textAlign = 'center';
    ctx.fillText('🏛 THIS DAY IN HISTORY', 540, 160);
    // Year
    ctx.fillStyle = '#fff'; ctx.font = 'bold 160px -apple-system, Arial';
    ctx.fillText(entry.y, 540, 380);
    // Divider
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(200, 420); ctx.lineTo(880, 420); ctx.stroke();
    // Text
    ctx.fillStyle = '#e9d5ff'; ctx.font = '46px -apple-system, Arial';
    wrapText(ctx, entry.t, 540, 500, 920, 62);
    // Ago
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = 'italic 34px -apple-system, Arial';
    ctx.fillText(`📆 Vor ${ago} Jahren`, 540, 960);
    // Watermark
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '26px -apple-system, Arial';
    ctx.fillText(`Maya's Morning Brief · ${dateStr}`, 540, 1045);

  } else if (type === 'evening-quote') {
    const eq = eveningQuotes[doy % eveningQuotes.length];
    const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
    grad.addColorStop(0, '#0f0f1e'); grad.addColorStop(1, '#1a1035');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1080);
    // Stars
    ctx.font = '60px serif'; ctx.textAlign = 'center';
    ctx.fillText('⭐ ✨ 🌙', 540, 160);
    // Quote
    ctx.fillStyle = '#e0d7ff'; ctx.font = 'italic bold 52px -apple-system, Arial';
    wrapText(ctx, `"${eq.t}"`, 540, 280, 920, 70);
    if (eq.de) {
      ctx.fillStyle = '#a78bfa'; ctx.font = '38px -apple-system, Arial';
      wrapText(ctx, `„${eq.de}"`, 540, 750, 920, 52);
    }
    if (eq.a) { ctx.fillStyle = '#818cf8'; ctx.font = 'italic 34px -apple-system, Arial'; ctx.fillText(`— ${eq.a}`, 540, 940); }
    ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '26px -apple-system, Arial';
    ctx.fillText(`Maya's Morning Brief · ${dateStr}`, 540, 1045);
  }

  return new Promise(res => canvas.toBlob(res, 'image/png', 0.95));
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  let currentY = y;
  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      ctx.fillText(line.trim(), x, currentY);
      line = words[n] + ' ';
      currentY += lineHeight;
    } else { line = testLine; }
  }
  ctx.fillText(line.trim(), x, currentY);
}

function shareCard(cardId, emoji, title) {
  haptic();
  let text = `${emoji} ${title}\n`;
  const card = document.getElementById(cardId);
  if (!card) return;

  if (cardId === 'news-section') {
    card.querySelectorAll('.news-item').forEach((el, i) => {
      const t = el.querySelector('.news-text')?.textContent;
      const s = el.querySelector('.news-source')?.textContent;
      if (t) text += `${i+1}. ${t}\n   ${s||''}\n`;
    });
  } else if (cardId === 'war-section') {
    card.querySelectorAll('.news-item').forEach((el, i) => {
      const t = el.querySelector('.news-text')?.textContent;
      if (t) text += `${i+1}. ${t}\n`;
    });
  } else if (cardId === 'weather-section') {
    const temp = card.querySelector('.weather-temp-big')?.textContent;
    const desc = card.querySelector('.weather-desc')?.textContent;
    const feels = card.querySelector('.weather-feels')?.textContent;
    const loc = card.querySelector('.weather-location')?.textContent;
    text += `${loc||''}\n${temp} — ${desc}\n${feels}\n`;
    card.querySelectorAll('.w-item').forEach(el => {
      const lbl = el.querySelector('.w-item-label')?.textContent;
      const val = el.querySelector('.w-item-val')?.textContent;
      if (lbl && val) text += `${lbl}: ${val}\n`;
    });
  } else if (cardId === 'motivation-section') {
    const q = card.querySelector('.motivation-quote')?.textContent;
    const d = card.querySelector('.motivation-translation')?.textContent;
    const a = card.querySelector('.motivation-author')?.textContent;
    if (q) text += `${q}\n`;
    if (d) text += `${d}\n`;
    if (a) text += `${a}\n`;
  } else if (cardId === 'history-section') {
    const y = card.querySelector('.history-year')?.textContent;
    const t = card.querySelector('.history-text')?.textContent;
    const ago = card.querySelector('.history-ago')?.textContent;
    if (y && t) text += `${y}: ${t}\n${ago||''}\n`;
  } else if (cardId === 'word-section') {
    const w = card.querySelector('.word-main')?.textContent;
    const ph = card.querySelector('.word-phonetic')?.textContent;
    const def = card.querySelector('.word-def')?.textContent;
    const ex = card.querySelector('.word-example')?.textContent;
    const de = card.querySelector('.word-de')?.textContent;
    text += `${w} ${ph}\n${def}\n${ex||''}\n${de||''}\n`;
  } else {
    // fallback: all text nodes
    text += card.innerText.replace(/\n{3,}/g, '\n\n').trim();
  }
  text += '\n— Maya\'s Morning Brief 🌅';
  shareText(text, title);
}

async function loadPhotos() {

  const cats = [0,1,2].map(i => photoCurated[(doy + i * 2) % photoCurated.length]);

  document.getElementById('photo-section').innerHTML = `
    <div class="card photo-card">

      </div>

  const galleryHtml = cats.map((cat, i) => {
    const p = cat.photos[(doy + i) % cat.photos.length];
    // Unsplash direkte Bild-URL (immer verfügbar, kein API-Key nötig)
    const src = `https://images.unsplash.com/photo-${p.id}?w=800&h=800&fit=crop&q=85&auto=format`;
    const srcLarge = `https://images.unsplash.com/photo-${p.id}?w=1600&h=1600&fit=crop&q=90&auto=format`;
    return `
      <div class="photo-item" onclick="openLightbox('${srcLarge}','${cat.tag} — ${p.cap}')">

        <div class="photo-caption">${p.cap}</div>

  }).join('');

  const inner = document.getElementById('photo-gallery-inner');
  if (inner) inner.innerHTML = galleryHtml;
}

const TODO_KEY = 'maya_todos';

function getTodos() {
  try { return JSON.parse(localStorage.getItem(TODO_KEY)) || []; }
  catch { return []; }
}
function saveTodos(todos) {
  localStorage.setItem(TODO_KEY, JSON.stringify(todos));
}
function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

function processCarryover() {
  // Move undone todos from previous days to carryover
  const todos = getTodos();
  const today = todayStr();
  todos.forEach(t => {
    if (t.date !== today && !t.done && !t.carryover) {
      t.carryover = true;
      t.originalDate = t.date;
    }
  });
  saveTodos(todos);
}

function renderTodos() {
  processCarryover();
  const todos = getTodos();
  const today = todayStr();
  const todayTodos = todos.filter(t => t.date === today);
  const carryover  = todos.filter(t => t.carryover && !t.done);

  const todayDone  = todayTodos.filter(t => t.done).length;
  const todayTotal = todayTodos.length;

  const todoHtml = todayTodos.map(t => buildTodoItemHtml(t)).join('');

  const carryHtml = carryover.length ? `
    <div class="todo-carryover">
      <div class="todo-carryover-title">↩ Übertragen vom Vortag</div>
      ${carryover.map(t => `
        <div class="todo-carryover-item" onclick="addFromCarryover('${t.id}'); haptic()">
          <span class="todo-carryover-text">${escHtml(t.text)}</span>
          <span class="todo-carryover-badge">↩ ${t.originalDate||''}</span>
          <button class="todo-carryover-add-btn">+ Heute</button>
        </div>`).join('')}
    </div>` : '';

  document.getElementById('todo-section').innerHTML = `
    <div class="card todo-card">
      <div class="card-header">
        <div class="card-title">✅ To-Do · Heute</div>
        <button class="share-btn" onclick="shareTodos()">⎙ Teilen</button>
      </div>
      <div class="todo-add-row">
        <input class="todo-add-input" id="todo-new-input" placeholder="Neue Aufgabe…" maxlength="120"
          onkeydown="if(event.key==='Enter'){addTodo();haptic();}">
        <button class="todo-add-btn" onclick="addTodo(); haptic()">+</button>
      </div>
      <div id="todo-list">${todoHtml || '<p style="font-size:13px;color:#9ca3af;text-align:center;padding:12px 0">Noch keine Aufgaben für heute 🎉</p>'}</div>
      ${carryHtml}
      ${todayTotal > 0 ? `
        <div class="todo-stats">
          <span class="todo-stat">✅ <strong>${todayDone}</strong> erledigt</span>
          <span class="todo-stat">⏳ <strong>${todayTotal - todayDone}</strong> offen</span>
          <span class="todo-stat">📋 <strong>${todayTotal}</strong> gesamt</span>
        </div>` : ''}
    </div>`;
}

function buildTodoItemHtml(t) {
  const subsHtml = (t.subs || []).map((s, si) => `
    <div class="todo-sub-item">
      <div class="todo-sub-check ${s.done?'done':''}" onclick="toggleSub('${t.id}',${si}); haptic()">
        ${s.done ? '✓' : ''}
      </div>
      <span class="todo-sub-text ${s.done?'done':''}">${escHtml(s.text)}</span>
      <button class="todo-sub-del" onclick="deleteSub('${t.id}',${si}); haptic()">✕</button>
    </div>`).join('');

  return `
    <div class="todo-item ${t.done?'done':''}" id="todo-${t.id}">
      <div class="todo-main-row">
        <div class="todo-check" onclick="toggleTodo('${t.id}'); haptic()">
          <span class="todo-check-tick">✓</span>
        </div>
        <span class="todo-text">${escHtml(t.text)}</span>
        <button class="todo-expand-btn" onclick="toggleSubs('${t.id}')" title="Unteraufgaben">⋯</button>
        <button class="todo-delete-btn" onclick="deleteTodo('${t.id}'); haptic()">✕</button>
      </div>
      <div class="todo-subs" id="subs-${t.id}">
        ${subsHtml}
        <div class="todo-sub-add-row">
          <input class="todo-sub-add-input" id="sub-input-${t.id}" placeholder="Unteraufgabe…" maxlength="80"
            onkeydown="if(event.key==='Enter'){addSub('${t.id}');haptic();}">
          <button class="todo-sub-add-btn" onclick="addSub('${t.id}'); haptic()">+ Sub</button>
        </div>
      </div>
    </div>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function genId() { return Math.random().toString(36).slice(2,9); }

function addTodo() {
  const inp = document.getElementById('todo-new-input');
  const text = inp?.value.trim();
  if (!text) return;
  const todos = getTodos();
  todos.push({ id: genId(), text, done: false, date: todayStr(), subs: [], carryover: false });
  saveTodos(todos);
  inp.value = '';
  renderTodos();
}

function toggleTodo(id) {
  const todos = getTodos();
  const t = todos.find(t => t.id === id);
  if (t) { t.done = !t.done; if (t.done) t.carryover = false; }
  saveTodos(todos);
  renderTodos();
}

function deleteTodo(id) {
  saveTodos(getTodos().filter(t => t.id !== id));
  renderTodos();
}

function toggleSubs(id) {
  const el = document.getElementById('subs-' + id);
  if (el) el.classList.toggle('open');
}

function addSub(todoId) {
  const inp = document.getElementById('sub-input-' + todoId);
  const text = inp?.value.trim();
  if (!text) return;
  const todos = getTodos();
  const t = todos.find(t => t.id === todoId);
  if (t) { t.subs = t.subs || []; t.subs.push({ text, done: false }); }
  saveTodos(todos);
  renderTodos();
  // re-open the subs panel
  setTimeout(() => { const el = document.getElementById('subs-' + todoId); if(el) el.classList.add('open'); }, 10);
}

function toggleSub(todoId, subIdx) {
  const todos = getTodos();
  const t = todos.find(t => t.id === todoId);
  if (t && t.subs[subIdx]) t.subs[subIdx].done = !t.subs[subIdx].done;
  saveTodos(todos);
  renderTodos();
  setTimeout(() => { const el = document.getElementById('subs-' + todoId); if(el) el.classList.add('open'); }, 10);
}

function deleteSub(todoId, subIdx) {
  const todos = getTodos();
  const t = todos.find(t => t.id === todoId);
  if (t) t.subs.splice(subIdx, 1);
  saveTodos(todos);
  renderTodos();
  setTimeout(() => { const el = document.getElementById('subs-' + todoId); if(el) el.classList.add('open'); }, 10);
}

function addFromCarryover(id) {
  const todos = getTodos();
  const t = todos.find(t => t.id === id);
  if (t) { t.carryover = false; t.done = false; t.date = todayStr(); }
  saveTodos(todos);
  renderTodos();
}

function shareTodos() {
  haptic();
  const todos = getTodos().filter(t => t.date === todayStr());
  if (!todos.length) { alert('Keine Todos für heute.'); return; }
  let text = `✅ Meine Todos für heute:\n\n`;
  todos.forEach((t, i) => {
    text += `${t.done ? '☑' : '☐'} ${t.text}\n`;
    (t.subs||[]).forEach(s => { text += `   ${s.done?'☑':'☐'} ${s.text}\n`; });
  });
  text += '\n— Maya\'s Morning Brief 🌅';
  shareText(text, 'Meine Todos');
}

// Add share buttons to existing render functions via wrapper
function withShareHeader(html, cardId, emoji, title) {
  // Inject share btn into first .card-title found
  return html.replace(
    /(<div class="card-title">)(.*?)(<\/div>)/,
    `<div class="card-header"><div class="card-title">$2</div><button class="share-btn" onclick="shareCard('${cardId}','${emoji}','${title}')">⎙ Teilen</button></div>`
  );
}

// PULL-TO-REFRESH
// ═══════════════════════════════════════════════════════
(function() {
  let startY = 0, pulling = false, triggered = false;
  const THRESHOLD = 72;

  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
      triggered = false;
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    const ind = document.getElementById('ptr-indicator');
    if (dy > 20 && window.scrollY === 0) {
      if (ind) {
        ind.classList.add('visible');
        ind.textContent = dy > THRESHOLD ? '↑ Loslassen zum Aktualisieren' : '↓ Zum Aktualisieren ziehen';
      }
      if (dy > THRESHOLD && !triggered) { triggered = true; haptic('medium'); }
    }
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const ind = document.getElementById('ptr-indicator');
    if (ind) ind.classList.remove('visible');
    if (triggered) { triggered = false; refresh(); }
  });
})();

let _recipeOffset = 0; // user can browse recipes with arrows

function renderRecipe(offset) {
  if (offset !== undefined) _recipeOffset = offset;
  const now = new Date();
  const doy = Math.floor((now - new Date(now.getFullYear(),0,0))/86400000);
  const idx = ((doy + _recipeOffset) % recipes.length + recipes.length) % recipes.length;
  const r = recipes[idx];
  const total = recipes.length;

  const ingHtml = r.ingredients.map(([name, amount, kcal]) =>
    `<li><span>${name} <span style="color:#bbb;font-size:11px">${amount}</span></span><span style="color:#a05020;font-size:11px">${kcal}</span></li>`
  ).join('');
  const stepsHtml = r.steps.map((s, i) => `<div class="recipe-step" data-n="${i+1}">${s}</div>`).join('');

  document.getElementById('recipe-section').innerHTML = `
    <div class="card recipe-card">
      <div class="card-header">
        <div class="card-title">🍽️ Rezept des Tages</div>
        <button class="share-btn" onclick="shareRecipe()">⎙ Teilen</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <button onclick="haptic();renderRecipe(${_recipeOffset - 1})" style="background:#fff3e8;border:1.5px solid #f8c8a0;border-radius:12px;padding:8px 16px;font-size:18px;cursor:pointer;color:#a05020;font-weight:700;">←</button>
        <span style="font-size:11px;color:#bbb;font-weight:600;">${((idx+1))} / ${total}</span>
        <button onclick="haptic();renderRecipe(${_recipeOffset + 1})" style="background:#fff3e8;border:1.5px solid #f8c8a0;border-radius:12px;padding:8px 16px;font-size:18px;cursor:pointer;color:#a05020;font-weight:700;">→</button>
      </div>
      <span class="recipe-kcal-badge">${r.badge} · ${r.kcal} kcal</span>
      <div class="recipe-name">${r.name}</div>
      <div class="recipe-macros">
        <span class="recipe-macro">🥩 ${r.protein}g Protein</span>
        <span class="recipe-macro">🫙 ${r.fat}g Fett</span>
        <span class="recipe-macro">🌾 ${r.carbs}g KH</span>
      </div>
      <div class="recipe-section-title">Zutaten</div>
      <ul class="recipe-ingredients">${ingHtml}</ul>
      <div class="recipe-section-title">Zubereitung</div>
      <div class="recipe-steps">${stepsHtml}</div>
      <div class="recipe-airfryer">🔥 <strong>Airfryer:</strong> ${r.airfryer}</div>
    </div>`;
}

function shareRecipe() {
  haptic();
  const r = recipes[Math.floor((new Date() - new Date(new Date().getFullYear(),0,0))/86400000) % recipes.length];
  let text = `🍽️ Rezept des Tages: ${r.name}\n`;
  text += `${r.kcal} kcal · ${r.protein}g Protein · ${r.fat}g Fett · ${r.carbs}g KH\n\n`;
  text += `Zutaten:\n`;
  r.ingredients.forEach(([n,a]) => { text += `• ${n} ${a}\n`; });
  text += `\nZubereitung:\n`;
  r.steps.forEach((s,i) => { text += `${i+1}. ${s}\n`; });
  text += `\n🔥 ${r.airfryer}\n— May's Brief`;
  shareText(text, r.name);
}

// ═══════════════════════════════════════════════════════
const REFRESH_TIMES=[[0,0],[6,0],[12,0],[14,0],[16,0],[18,30]]; // 00:00 NEU!

function msUntilNext() {
  const now=new Date();
  const cur=now.getHours()*60+now.getMinutes();
  for(const [h,m] of REFRESH_TIMES){
    const t=h*60+m;
    if(t>cur) return (t-cur)*60000-now.getSeconds()*1000-now.getMilliseconds();
  }
  // Nächste Mitternacht
  const tom=new Date(now); tom.setDate(tom.getDate()+1); tom.setHours(0,0,2,0);
  return tom-now;
}

// Speichert welcher Tag zuletzt gerendert wurde (für Daily-Content-Wechsel)
let _lastDailyDate = null;

function isDailyContentStale() {
  const today = new Date().toDateString();
  return _lastDailyDate !== today;
}

function scheduleNext() {
  const ms = msUntilNext();
  setTimeout(() => {
    loadAll(true);
    scheduleNext();
  }, ms);
}

// SLEEP RECOMMENDATION
// ═══════════════════════════════════════════════════════
function getSleepRecommendation() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const totalMins = h * 60 + m;
  const cycles = [
    { wake: 6*60,   label: '06:00' },
    { wake: 6*60+30,label: '06:30' },
    { wake: 7*60,   label: '07:00' },
    { wake: 7*60+30,label: '07:30' },
  ];
  const SLEEP_ONSET = 14; // mins to fall asleep
  const CYCLE = 90;       // mins per sleep cycle
  return cycles.map(c => {
    let wakeMin = c.wake;
    if (wakeMin <= totalMins) wakeMin += 24*60;
    const available = wakeMin - totalMins - SLEEP_ONSET;
    const full = Math.floor(available / CYCLE);
    const rec = full >= 1 ? full : 1;
    const sleepAt = new Date(now.getTime() + SLEEP_ONSET * 60000);
    const wakeAt = new Date(now.getTime() + (SLEEP_ONSET + rec * CYCLE) * 60000);
    const pad = n => String(n).padStart(2,'0');
    return {
      wake: c.label,
      sleepNow: `${pad(sleepAt.getHours())}:${pad(sleepAt.getMinutes())}`,
      cycles: rec,
      hours: (rec * CYCLE / 60).toFixed(1),
      quality: rec >= 5 ? '🟢 Optimal' : rec >= 4 ? '🟡 Gut' : rec >= 3 ? '🟠 Ok' : '🔴 Wenig',
    };
  });
}

const REFLECT_KEY = 'maya_reflect_';
const REFLECT_ARCHIVE_KEY = 'maya_reflect_archive';

function reflectKey() {
  const n=new Date(); return `${n.getFullYear()}-${n.getMonth()}-${n.getDate()}`;
}
function reflectDateLabel(key) {
  // key = "year-month-date" (month is 0-based from Date)
  const parts = key.split('-');
  if (parts.length !== 3) return key;
  const d = new Date(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  return `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}
function saveReflection(data) {
  const key = reflectKey();
  localStorage.setItem(REFLECT_KEY + key, JSON.stringify(data));
  // Also save to archive index
  let archive = getReflectionArchiveIndex();
  if (!archive.includes(key)) { archive.unshift(key); }
  localStorage.setItem(REFLECT_ARCHIVE_KEY, JSON.stringify(archive));
}
function getReflection() {
  const s = localStorage.getItem(REFLECT_KEY + reflectKey());
  return s ? JSON.parse(s) : null;
}
function getReflectionArchiveIndex() {
  try { return JSON.parse(localStorage.getItem(REFLECT_ARCHIVE_KEY)) || []; } catch { return []; }
}
function getAllReflections() {
  const keys = getReflectionArchiveIndex();
  return keys.map(k => {
    const s = localStorage.getItem(REFLECT_KEY + k);
    return s ? { key: k, ...JSON.parse(s) } : null;
  }).filter(Boolean);
}

  const good = document.getElementById('reflect-good')?.value?.trim();

function startBreathing() {
  haptic('heavy');
  document.getElementById('breath-card').style.display = 'block';
  document.getElementById('breath-card').scrollIntoView({behavior:'smooth', block:'nearest'});
  _breathCount = 0;
  runBreathCycle();
}

function runBreathCycle() {
  const circle = document.getElementById('breath-circle');
  const label = document.getElementById('breath-label');
  const phase = document.getElementById('breath-phase-text');
  const count = document.getElementById('breath-count-text');
  if (!circle) return;

  _breathCount++;
  count.textContent = `Runde ${_breathCount} von 4`;

  // Einatmen — 4 Sek
  circle.className = 'breath-circle in';
  label.innerHTML = 'Ein<br>4 Sek';
  phase.textContent = 'Einatmen...';
  haptic();

  _breathTimer = setTimeout(() => {
    // Halten — 7 Sek
    circle.className = 'breath-circle hold';
    label.innerHTML = 'Halten<br>7 Sek';
    phase.textContent = 'Halten...';
    haptic();

    _breathTimer = setTimeout(() => {
      // Ausatmen — 8 Sek
      circle.className = 'breath-circle out';
      label.innerHTML = 'Aus<br>8 Sek';
      phase.textContent = 'Ausatmen...';
      haptic();

      _breathTimer = setTimeout(() => {
        if (_breathCount < 4) {
          runBreathCycle();
        } else {
          circle.className = 'breath-circle';
          label.innerHTML = '🌸<br>Fertig';
          phase.textContent = '✅ Gut gemacht!';
          count.textContent = '4 Runden abgeschlossen';
          haptic('heavy');
          showToast('🌸 Atemübung abgeschlossen! Du hast das toll gemacht.');
        }
      }, 8000);
    }, 7000);
  }, 4000);
}

function stopBreathing() {
  if (_breathTimer) clearTimeout(_breathTimer);
  _breathTimer = null;
  _breathCount = 0;
  const circle = document.getElementById('breath-circle');
  const label = document.getElementById('breath-label');
  const phase = document.getElementById('breath-phase-text');
  if (circle) { circle.className = 'breath-circle'; label.innerHTML = 'Tippe<br>zum Start'; }
  if (phase) phase.textContent = 'Bereit';
  document.getElementById('breath-card').style.display = 'none';
}

function toggleGrounding(n) {
  haptic();
  const el = document.getElementById(`gs-${n}`);
  if (_groundingDone.has(n)) { _groundingDone.delete(n); el.classList.remove('done'); }
  else { _groundingDone.add(n); el.classList.add('done'); }
  if (_groundingDone.size === 5) showToast('🌿 Grounding abgeschlossen! Du bist jetzt im Hier und Jetzt.');
}

function resetGrounding() {
  _groundingDone.clear();
  groundingSteps.forEach(s => document.getElementById(`gs-${s.n}`)?.classList.remove('done'));
}

let _factIdx = 0;
function nextFact() {
  haptic();
  _factIdx = (_factIdx + 1) % panicFacts.length;
  const el = document.getElementById('panic-fact-display');
  if (el) el.textContent = panicFacts[_factIdx];
}

function nextAffirmation() {
  haptic();
  _affirmIdx = (_affirmIdx + 1) % affirmations.length;
  const el = document.getElementById('affirmation-display');
  if (el) el.innerHTML = `"${affirmations[_affirmIdx]}"`;
}

function switchTab(tab) {
  haptic();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'evening') renderSummary();
  if (tab === 'aidy') renderAidy();
}
